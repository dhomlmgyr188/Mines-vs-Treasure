<html lang="en">
<head>
    <style>
        body{ display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #f0f4f8; font-family: Arial; }
        .game-container{ text-align: center; width: 350px; padding: 20px; background: #fff; box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2); border-radius: 10px;}
        h1{ color: #4a90e2; font-size: 2em; }
        .game-info p{ margin: 5px 0; }
        .display-area{ font-size: 3em; background: #e9f7ef; border-radius: 8px; margin: 20px 0; padding: 20px;}
        #end-message{ font-size: 1.5em; margin-top: 20px; color: #4e90e2; font-weight: bold;}
    </style>
</head>
<body>
    <div class="game-container">
        <h1>Key press Game</h1>
        <div class="game-info">
            <p>Score:<span id="score">0</span></p>
            <p>Time left: <span id="time-left">60</span></p>
        </div>
        <div class="display-area" id="random-char">A</div>
        <div id="end-message"></div>
    </div>
    <script>
        let score = 0, timeLeft = 60, currentChar, timer, gameinterval;
        function getRandomChar(){
            return 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'[Math.floor(Math.random() * 36)];
        }
        function startGame(){
            gameinterval = setInterval(() => {
                currentChar = getRandomChar();
                document.getElementById('random-char').innerText = currentChar;
            }, 1250);
            timer = setInterval(() => {
                if(--timeLeft < 0) endGame();
                document.getElementById('time-left').innerText = timeLeft;
            }, 1000);
        }
        function endGame(){
            clearInterval(timer);
            clearInterval(gameinterval);
            document.getElementById('end-message').innerText = score >= 10 ? 'You Win!': 'Game Over!';
        }
        document.addEventListener('keydown', (e) => {
            if (e.key.toUpperCase() === currentChar) {
                score++;
                document.getElementById('random-char').innerText = "";
            }
            else{
                score--;
            }
        document.getElementById('score').innerText = score;});
            window.onload = () => { 
                startGame();
                document.getElementById('time-left').innerText = timeLeft;
            }
       
    </script>
</body>
</html>
