<html lang="en">
<body>
    <div id="game-container" style="position: relative; width: 400px; height: 400px; background: #fff; border: 2px solid #333;">
        <div id="score" style="position: absolute; top: 10px; right: 10px; font-size: 20px;">Score: 0</div>
    </div>
    <script>
        const gameContainer = document.getElementById('game-container');
        const scoreDisplay = document.getElementById('score');
        let score = 0;

        function createTargets(colors) {
            colors.forEach((color, index) => {
                const target = document.createElement('div');
                target.style.position = 'absolute';
                target.style.width = '40px';
                target.style.height = '40px';
                target.style.backgroundColor = color;
                target.style.borderRadius = '50%';
                target.style.cursor = 'pointer';
                gameContainer.appendChild(target);
                moveTarget(target, (index + 1) * 500);
                
                target.addEventListener('click', () => {
                    score++;
                    scoreDisplay.textContent = `Score: ${score}`;
                    moveTarget(target, Math.random() * 1500 + 2000);
                });
            });
        }

        function moveTarget(target, delay) {
            setTimeout(() => {
                const maxX = gameContainer.clientWidth - target.offsetWidth;
                const maxY = gameContainer.clientHeight - target.offsetHeight;
                target.style.left = `${Math.floor(Math.random() * maxX)}px`;
                target.style.top = `${Math.floor(Math.random() * maxY)}px`;
                target.style.opacity = 1;
                
                setTimeout(() => {
                    if (target.style.opacity == 1) {
                        score--;
                        scoreDisplay.textContent = `Score: ${score}`;
                        moveTarget(target, Math.random() * 1500 + 2000);
                    } 
                }, 500);
            }, delay);
        }

        createTargets(["magenta", "blue"]);
    </script>
</body>
</html>
